name: Build Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # =========================================================================
  # Linux x86_64 (manylinux_2_28)
  # =========================================================================
  build_linux_x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-manylinux_x86_64 cp310-manylinux_x86_64 cp311-manylinux_x86_64 cp312-manylinux_x86_64 cp313-manylinux_x86_64 cp314-manylinux_x86_64"
          CIBW_SKIP: "*-musllinux* *-win32"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_BEFORE_BUILD: python -m pip install --upgrade pip setuptools wheel numpy
          CIBW_TEST_COMMAND: python -c "import gaussregular as gr; print(gr.__name__)"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: wheelhouse/*.whl

  # =========================================================================
  # Linux x86_64 (manylinux2014)
  # =========================================================================
  build_linux2014_x86_64:
    name: Linux2014 x86_64
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-manylinux2014_x86_64 cp310-manylinux2014_x86_64 cp311-manylinux2014_x86_64 cp312-manylinux2014_x86_64"
          CIBW_SKIP: "*-musllinux* *-win32"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux2014
          CIBW_BEFORE_BUILD: python -m pip install --upgrade pip setuptools wheel numpy
          CIBW_TEST_COMMAND: python -c "import gaussregular as gr; print(gr.__name__)"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux2014-x86_64
          path: wheelhouse/*.whl

  # =========================================================================
  # macOS arm64
  # =========================================================================
  build_macos_arm64:
    name: macOS arm64
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-macosx_arm64 cp310-macosx_arm64 cp311-macosx_arm64 cp312-macosx_arm64 cp313-macosx_arm64 cp314-macosx_arm64"
          CIBW_BEFORE_BUILD: python -m pip install --upgrade pip setuptools wheel numpy
          CIBW_TEST_COMMAND: python -c "import gaussregular as gr; print(gr.__name__)"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-arm64
          path: wheelhouse/*.whl

  # =========================================================================
  # Windows x86_64
  # =========================================================================
  build_windows_x86_64:
    name: Windows x86_64
    runs-on: windows-2022
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: pip install cibuildwheel==3.4.0

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp39-win_amd64 cp310-win_amd64 cp311-win_amd64 cp312-win_amd64 cp313-win_amd64 cp314-win_amd64"
          CIBW_SKIP: "*-musllinux* *-win32"
          CIBW_BEFORE_BUILD: python -m pip install --upgrade pip setuptools wheel numpy
          CIBW_TEST_COMMAND: python -c "import gaussregular as gr; print(gr.__name__)"
          CIBW_BUILD_VERBOSITY: 1

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x86_64
          path: wheelhouse/*.whl

  # =========================================================================
  # Source distribution
  # =========================================================================
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
  # =========================================================================
  # Test installation
  # =========================================================================
  test_install:
    name: Test ${{ matrix.os }}
    needs: [build_linux_x86_64, build_macos_arm64, build_windows_x86_64]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
        python-version: ["3.9", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Install wheel
        run: pip install --find-links dist gaussregular

      - name: Verify installation
        run: python -c "import gaussregular as gr"

  # =========================================================================
  # Publish to PyPI (on tag push)
  # =========================================================================
  # Two authentication methods available:
  # 1. API Token (current): Set PYPI_API_TOKEN in GitHub Secrets
  # 2. Trusted Publisher: Remove password, add "permissions: id-token: write"
  # =========================================================================
  publish:
    name: Publish to PyPI
    needs: [test_install, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
